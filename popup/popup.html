<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>YouTube Time Tracker</title>
  <style>
    body {
      font-family: sans-serif;
      width: 200px;
      padding: 16px;
      text-align: center;
    }
    #time {
      font-size: 2em;
      font-weight: bold;
      margin-bottom: 12px;
    }
    button {
      font-size: 1em;
      padding: 8px 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="time">--:--</div>
  <button id="add">+ 5 minutes</button>
  <script src="popup.js"></script>
</body>
</html>
